{% extends 'base.html' %}

{% block content %}
<div class="container" style="display: block;">
    <h1 class="text-center mb-4">{{ title }}</h1>
    <div id="map" style="width: 100%; height: 450px; margin-bottom: 20px; border-radius: 16px;"></div>
</div>

<script src="https://api-maps.yandex.ru/2.1/?apikey=a32836fa-47b8-4ac6-ac9f-5f1fa4586172&lang=ru_RU" type="text/javascript"></script>
<script type="text/javascript">
    const COORDINATES = [55.753215, 37.622504];  // замените на свои координаты
    ymaps.ready(init);
    function init() {
        var myMap = new ymaps.Map("map", {
            center: COORDINATES,
            zoom: 17,
            controls: ['zoomControl', 'fullscreenControl', 'geolocationControl']
        });
        var myPlacemark = new ymaps.Placemark(COORDINATES, {
            balloonContent: '<strong>Ваша Фитнес-Студия</strong><br/>Здесь находится наш зал.<br/><a href="/about/">Подробнее...</a>',
        }, {
            preset: 'islands#redSportIcon',
            iconColor: '#10b981'
        });
        myMap.geoObjects.add(myPlacemark);
    }
</script>
{% endblock %}
