{% extends 'base.html' %}

{% block content %}
<div class="form-container">
    <h1>Авторизация</h1>
    <form method="post">
        {% csrf_token %}
        <input type="hidden" name="next" value="{{ next }}" />
        {{ form.as_p }}
        <button type="submit">Войти</button>
    </form>
    <p><a href="{% url 'users:register' %}">Регистрация</a></p>
</div>
{% endblock %}
