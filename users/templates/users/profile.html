{% extends 'base.html' %}

{% block content %}
<div class="form-container">
    <h1>Профиль</h1>
    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        {% if user.avatar %}
            <img src="{{ user.avatar.url }}" width="100">
        {% endif %}
        {{ form.as_p }}
        <button type="submit">Сохранить</button>
    </form>
    <hr>
    <a href="{% url 'orders:my_orders' %}">Мои заказы</a> |
    <a href="{% url 'users:password_change' %}">Сменить пароль</a>
</div>
{% endblock %}
